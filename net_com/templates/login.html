<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Campus Complaint System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="auth-bg d-flex align-items-center min-vh-100">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-sm-10 col-md-7 col-lg-5">

      <!-- Logo / Brand -->
      <div class="text-center mb-4">
        <div class="brand-icon mb-2">
          <i class="bi bi-wifi fs-1 text-primary"></i>
        </div>
        <h4 class="fw-bold text-dark">Campus Network</h4>
        <p class="text-muted small mb-0">Complaint Management System</p>
      </div>

      <!-- Card -->
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4 p-md-5">
          <h5 class="card-title fw-semibold mb-4 text-center">Sign In</h5>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
                {{ message }}
                <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endwith %}

          <form method="POST" action="{{ url_for('login') }}" novalidate>

            <!-- Role -->
            <div class="mb-3">
              <label class="form-label fw-medium small">Logging in as</label>
              <div class="d-flex gap-3">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="role" id="roleUser" value="user" checked />
                  <label class="form-check-label" for="roleUser">User</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="role" id="roleAdmin" value="admin" />
                  <label class="form-check-label" for="roleAdmin">Admin</label>
                </div>
              </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label for="email" class="form-label fw-medium small">Email address</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="bi bi-envelope text-muted"></i>
                </span>
                <input type="email" class="form-control border-start-0 ps-0"
                       id="email" name="email"
                       placeholder="you@campus.edu" required autocomplete="email" />
              </div>
            </div>

            <!-- Password -->
            <div class="mb-4">
              <label for="password" class="form-label fw-medium small">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="bi bi-lock text-muted"></i>
                </span>
                <input type="password" class="form-control border-start-0 ps-0"
                       id="password" name="password"
                       placeholder="••••••••" required autocomplete="current-password" />
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
              <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
          </form>

          <hr class="my-4" />

          <p class="text-center text-muted small mb-0">
            Don't have an account?
            <a href="{{ url_for('register') }}" class="text-decoration-none fw-medium">Register here</a>
          </p>
        </div>
      </div>

      <p class="text-center text-muted small mt-4">
        &copy; {{ 2025 }} Campus IT Department
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
