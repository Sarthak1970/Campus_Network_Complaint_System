<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register — Campus Complaint System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="auth-bg d-flex align-items-center min-vh-100">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-sm-10 col-md-8 col-lg-6">

      <!-- Brand -->
      <div class="text-center mb-4">
        <i class="bi bi-wifi fs-1 text-primary"></i>
        <h4 class="fw-bold text-dark mt-1">Campus Network</h4>
        <p class="text-muted small">Complaint Management System</p>
      </div>

      <!-- Card -->
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4 p-md-5">
          <h5 class="card-title fw-semibold mb-4 text-center">Create Account</h5>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
                {{ message }}
                <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endwith %}

          <form method="POST" action="{{ url_for('register') }}" novalidate>

            <!-- Full Name -->
            <div class="mb-3">
              <label for="name" class="form-label fw-medium small">Full Name</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="bi bi-person text-muted"></i>
                </span>
                <input type="text" class="form-control border-start-0 ps-0"
                       id="name" name="name" placeholder="John Doe" required />
              </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label for="email" class="form-label fw-medium small">Email Address</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="bi bi-envelope text-muted"></i>
                </span>
                <input type="email" class="form-control border-start-0 ps-0"
                       id="email" name="email" placeholder="you@campus.edu" required />
              </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label for="password" class="form-label fw-medium small">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="bi bi-lock text-muted"></i>
                </span>
                <input type="password" class="form-control border-start-0 ps-0"
                       id="password" name="password" placeholder="Min. 6 characters" required />
              </div>
            </div>

            <!-- Department -->
            <div class="mb-3">
              <label for="department" class="form-label fw-medium small">Department</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="bi bi-building text-muted"></i>
                </span>
                <input type="text" class="form-control border-start-0 ps-0"
                       id="department" name="department" placeholder="e.g. Computer Science" required />
              </div>
            </div>

            <!-- Role -->
            <div class="mb-4">
              <label class="form-label fw-medium small">Role</label>
              <div class="d-flex gap-4">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="role"
                         id="roleStudent" value="student" checked />
                  <label class="form-check-label" for="roleStudent">Student</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="role"
                         id="roleStaff" value="staff" />
                  <label class="form-check-label" for="roleStaff">Staff</label>
                </div>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
              <i class="bi bi-person-check me-1"></i> Create Account
            </button>
          </form>

          <hr class="my-4" />

          <p class="text-center text-muted small mb-0">
            Already have an account?
            <a href="{{ url_for('login') }}" class="text-decoration-none fw-medium">Sign in</a>
          </p>
        </div>
      </div>

      <p class="text-center text-muted small mt-4">
        &copy; 2025 Campus IT Department
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
